<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form App </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Web Development Bootcamp</h1>
    <p><b>Samarth Raju Kamble</b></p>
    <section class="gallery">
        
        <img src="html.png" width="200">
        <img src="https://yt3.ggpht.com/GwqllNX70BdeigoQbGgg4AqmCUXdLMZnFilsqYWq_-0kpR4o9hI7vyj58lffNkwJNBLL_DMQ8w=s48-c-k-c0x00ffffff-no-rj" alt="HTML" width="200" height="200">
        <img src="https://yt3.googleusercontent.com/Ph6tzV-x3es9gizzqecc4dkiHMXKMPY6vqcvZUaVW7SVKf-60n5L1evCsizfQ5e0HJOQzGpA=s120-c-k-c0x00ffffff-no-rj" alt="HTML" width="200" height="200">

        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>
    </section>
    <h2>My Form</h2>
    <form id="userForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <label for="age">Age:</label>
        <input type="age" id="age" required>
        <button type="submit">Submit</button>
    </form>
    <div id="output"></div>
    <section class="calculator">
        <h3>Sum Calculator</h3>
        <input type="number" id="a" placeholder="Enter A">
        <input type="number" id="b" placeholder="Enter B">
        <button id="calcBtn">Calculate Sum</button>
        <div id="sumOutput"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
